name: Build y push

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
        description: Tag de la imagen

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preparar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push de imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: ghcr.io/${{ github.repository_owner }}/simon-game:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
