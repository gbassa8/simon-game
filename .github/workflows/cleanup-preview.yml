name: Cleanup preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Setup de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependencias
        run: npm ci

      - name: Borrar schema preview
        run: npm run db:drop-schema
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          DATABASE_SCHEMA: preview_pr_${{ github.event.pull_request.number }}

      - name: Borrar tags preview en GHCR
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = `pr-${context.payload.pull_request.number}`;
            const versions = await github.paginate(github.rest.packages.getAllPackageVersionsForPackageOwnedByUser, {
              package_type: 'container',
              package_name: 'simon-game',
              per_page: 100,
              username: context.repo.owner,
            });

            for (const version of versions.filter((version) => {
              const tags = version.metadata?.container?.tags ?? [];
              return tags.includes(tagName);
            })) {
              await github.rest.packages.deletePackageVersionForUser({
                package_type: 'container',
                package_name: 'simon-game',
                package_version_id: version.id,
                username: context.repo.owner,
              });
            }

      - name: Crear comentario en el PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const body = [
              '## Preview cleanup',
              '',
              '- Namespace y recursos de Kubernetes: eliminados por ApplicationSet',
              `- Schema: \`preview_pr_${prNumber}\` eliminado`,
              `- Tag GHCR \`pr-${prNumber}\`: eliminado`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
